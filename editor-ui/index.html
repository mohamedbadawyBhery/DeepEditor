<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>🐺 DeepEditor - محرر الصقر</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐺</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Cairo', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        /* الشات */
        .chat-area {
            width: 400px;
            background: #12121a;
            border-right: 1px solid #2a2a3a;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #1a1a2a;
            padding: 12px 20px;
            border-bottom: 1px solid #2a2a3a;
        }
        .chat-header h3 {
            color: #4cc9f0;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 90%;
            word-wrap: break-word;
        }
        .user-message {
            background: #4cc9f0;
            color: #1a1a2a;
            align-self: flex-end;
        }
        .ai-message {
            background: #2a2a3a;
            color: #e0e0e0;
            align-self: flex-start;
        }
        .chat-input-area {
            padding: 15px;
            border-top: 1px solid #2a2a3a;
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex: 1;
            background: #1a1a2a;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            padding: 10px;
            color: #e0e0e0;
            resize: none;
            font-family: inherit;
        }
        .send-btn {
            background: #4cc9f0;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }
        /* المحرر */
        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .editor-header {
            background: #1a1a2a;
            padding: 12px 20px;
            border-bottom: 1px solid #2a2a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-name {
            color: #4cc9f0;
            font-weight: bold;
        }
        .btn {
            background: #2a2a3a;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            color: #e0e0e0;
            cursor: pointer;
        }
        .CodeMirror {
            flex: 1;
            height: calc(100vh - 120px);
            font-size: 14px;
        }
        .toolbar {
            background: #1a1a2a;
            padding: 10px 20px;
            border-top: 1px solid #2a2a3a;
            display: flex;
            gap: 10px;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a2a;
        }
        ::-webkit-scrollbar-thumb {
            background: #4cc9f0;
            border-radius: 3px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="chat-area">
        <div class="chat-header">
            <h3>🐺 نور حكيم - الشريك الإدراكي</h3>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
            <textarea class="chat-input" id="chat-input" rows="3" placeholder="اكتب رسالتك..."></textarea>
            <button class="send-btn" onclick="sendMessage()">إرسال</button>
        </div>
    </div>
    <div class="editor-area">
        <div class="editor-header">
            <div class="file-info">
                <span>📄 الملف الحالي:</span>
                <span class="file-name" id="current-file">غير مفتوح</span>
            </div>
            <div>
                <button class="btn" onclick="openFile()">📁 فتح ملف</button>
                <button class="btn" onclick="saveFile()">💾 حفظ</button>
            </div>
        </div>
        <textarea id="code-editor"></textarea>
        <div class="toolbar">
            <button class="btn" onclick="askAI('شرح الكود المحدد')">📖 شرح</button>
            <button class="btn" onclick="askAI('أضف دالة جديدة')">➕ إضافة دالة</button>
            <button class="btn" onclick="askAI('حلل هذا الكود واقترح تحسينات')">🔍 تحليل</button>
            <button class="btn" onclick="runCode()">▶️ تشغيل</button>
        </div>
    </div>
</div>
<script src="editor.js"></script>
<script>
    let lastMessageDiv = null;
    let autoScrollEnabled = true;
    const chatMessagesDiv = document.getElementById('chat-messages');

    function scrollToBottom() {
        if (autoScrollEnabled) chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }

    chatMessagesDiv.addEventListener('scroll', () => {
        const isAtBottom = chatMessagesDiv.scrollHeight - chatMessagesDiv.scrollTop <= chatMessagesDiv.clientHeight + 50;
        autoScrollEnabled = isAtBottom;
    });

    function addChatMessage(text, type = 'user') {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type === 'user' ? 'user-message' : 'ai-message'}`;
        msgDiv.innerHTML = text.replace(/\n/g, '<br>');
        chatMessagesDiv.appendChild(msgDiv);
        scrollToBottom();
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const message = input.value.trim();
        if (!message) return;
        addChatMessage(message, 'user');
        input.value = '';

        const typingDiv = document.createElement('div');
        typingDiv.className = 'message ai-message';
        typingDiv.innerHTML = '🐺 جاري التفكير...';
        chatMessagesDiv.appendChild(typingDiv);
        scrollToBottom();

        try {
            const response = await fetch('http://localhost:3456/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userMessage: message })
            });
            typingDiv.remove();

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let currentAiDiv = null;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.slice(6));
                            if (data.content) {
                                if (!currentAiDiv) {
                                    currentAiDiv = document.createElement('div');
                                    currentAiDiv.className = 'message ai-message';
                                    chatMessagesDiv.appendChild(currentAiDiv);
                                }
                                currentAiDiv.innerHTML += data.content.replace(/\n/g, '<br>');
                                scrollToBottom();
                            }
                            if (data.done) currentAiDiv = null;
                        } catch (e) {}
                    }
                }
            }
        } catch (error) {
            typingDiv.remove();
            addChatMessage(`❌ خطأ: ${error.message}`, 'error');
        }
    }

    window.sendMessage = sendMessage;
    window.addChatMessage = addChatMessage;

    document.addEventListener('DOMContentLoaded', () => {
        const chatInput = document.getElementById('chat-input');
        if (chatInput) {
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }
        addChatMessage("🐺 مرحباً! أنا نور حكيم، جاهز لمساعدتك.", 'ai');
    });
</script>
</body>
</html>
